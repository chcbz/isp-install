include /home/isp/apps/openldap/etc/openldap/schema/core.schema
include /home/isp/apps/openldap/etc/openldap/schema/collective.schema
include /home/isp/apps/openldap/etc/openldap/schema/corba.schema
include /home/isp/apps/openldap/etc/openldap/schema/cosine.schema
include /home/isp/apps/openldap/etc/openldap/schema/duaconf.schema
include /home/isp/apps/openldap/etc/openldap/schema/dyngroup.schema
include /home/isp/apps/openldap/etc/openldap/schema/inetorgperson.schema
include /home/isp/apps/openldap/etc/openldap/schema/java.schema
include /home/isp/apps/openldap/etc/openldap/schema/misc.schema
include /home/isp/apps/openldap/etc/openldap/schema/nis.schema
include /home/isp/apps/openldap/etc/openldap/schema/openldap.schema
include /home/isp/apps/openldap/etc/openldap/schema/pmi.schema
include /home/isp/apps/openldap/etc/openldap/schema/freeradius.schema
include /home/isp/apps/openldap/etc/openldap/schema/samba.schema
include /home/isp/apps/openldap/etc/openldap/schema/jiaperson.schema

pidfile /home/isp/apps/openldap/var/run/slapd.pid
argsfile /home/isp/apps/openldap/var/run/slapd.args

loglevel -1
logfile  /home/isp/apps/openldap/var/logs/slapd.log

modulepath /home/isp/apps/openldap/lib
#moduleload back_sql
moduleload memberof
overlay memberof

database monitor
access to *
	by dn.exact="gidNumber=0+uidNumber=0,cn=peercred,cn=external,cn=auth" read
	by dn.exact="cn=root,dc=chcbz,dc=net" read
	by * none

database mdb
#database sql
#dbname ldap
#dbuser openldap
#dbpasswd openldap
#subtree_cond "ldap_entries.dn LIKE CONCAT('%',?)"
#insentry_stmt "INSERT INTO ldap_entries (dn,oc_map_id,parent,keyval) VALUES (?,?,?,?)"
#has_ldapinfo_dn_ru no
#upper_func "upper"
#strcast_func "CONCAT"
#concat_pattern "?||?"
maxsize 1073741824
directory /home/isp/apps/openldap/var/openldap-data
index objectClass eq
suffix "dc=chcbz,dc=net"
rootdn "cn=root,dc=chcbz,dc=net"
rootpw {SSHA}REPLACE_WITH_YOUR_HASHED_PASSWORD
# 使用 slappasswd 生成密码哈希: slappasswd -h {SSHA}
