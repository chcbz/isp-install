server
{
  listen 80;
  server_name mq.wydiy.com;
  access_log /home/isp/logs/mq.wydiy.com.log main;
  location /
  {
    proxy_set_header MB-X-Forwarded-Host $host;
    proxy_set_header MB-X-Forwarded-Host-Port $host:$server_port;
    proxy_set_header MB-X-Forwarded-For $remote_addr;
    proxy_set_header Host $http_host;
    proxy_pass http://127.0.0.1:15672;
    proxy_redirect default;
    proxy_buffering on;
    proxy_buffer_size 64k;
    proxy_buffers 4 128k;
    proxy_busy_buffers_size 128k;
    proxy_store off;
    proxy_connect_timeout 20;
    proxy_send_timeout    60;
    proxy_read_timeout    60;
  }
}
