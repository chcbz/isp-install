user isp isp;
worker_processes 2;
worker_rlimit_nofile 40000;
pid /home/isp/apps/nginx/nginx.pid;

events
{
  worker_connections 2000;
  multi_accept on;
  use epoll;
}

http
{
  include              mime.types;
  default_type         application/octet-stream;
  client_max_body_size 100m;
  server_names_hash_bucket_size 64;
  sendfile             on;
  access_log off;
  error_log /home/isp/logs/nginx.log crit;
  keepalive_timeout    100;
  log_format main '$host $remote_addr $http_x_forwarded_for - $remote_user [$time_local] $request_time ' '"$request" $status $bytes_sent "$http_user_agent"';
  log_format logstash '$http_host $server_addr $remote_addr [$time_local] "$request" ' '$request_body $status $body_bytes_sent "$http_referer" "$http_user_agent" ' '$request_time $upstream_response_time';

  #FastCGI
  fastcgi_connect_timeout 300;
  fastcgi_send_timeout 300;
  fastcgi_read_timeout 300;
  fastcgi_buffer_size 64k;
  fastcgi_buffers 4 64k;
  fastcgi_busy_buffers_size 128k;
  fastcgi_temp_file_write_size 128k;

  gzip on;
  gzip_disable "msie6";
  gzip_proxied any;
  gzip_min_length 1000;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  open_file_cache max=100000 inactive=20s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

